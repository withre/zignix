name: Update Zig pins

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-zig-pins
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Update pins
        run: python3 scripts/update-zig-master-pins.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet -- \
            packages/zig-master/default.nix \
            packages/zig-0_16/default.nix \
            README.org; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify builds
        if: steps.changes.outputs.changed == 'true'
        # Only x86_64-linux is built here. The other systems' hashes are
        # deterministic conversions of upstream shasums (see the update
        # script), so they are not fetched/built on this runner.
        run: nix build .#zig-master .#zig-0_16

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          master=$(grep -m1 'version = ' packages/zig-master/default.nix | cut -d'"' -f2)

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            packages/zig-master/default.nix \
            packages/zig-0_16/default.nix \
            README.org
          git commit -m "Update Zig pins (master ${master})"
          git push
